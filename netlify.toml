[build]
  base = "frontend"
  command = "pnpm install --frozen-lockfile && pnpm build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: every unknown route serves index.html so the React app boots.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
