version: "3"

tasks:
  install:
    desc: "Install Python deps (incl. llama-cpp-python + openai-whisper)"
    cmds:
      - uv sync --group model

  install:transformers:
    desc: "Also install the torch/transformers path used for the Phase 5 HF deploy"
    cmds:
      - uv sync --group model --group model-transformers

  dev:
    desc: "Run the FastAPI backend with autoreload on :8000"
    cmds:
      - uv run uvicorn main:app --reload --port 8000 {{.CLI_ARGS}}

  lint:
    desc: "Run ruff"
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  format:
    desc: "Apply ruff formatting"
    cmds:
      - uv run ruff format .

  stop:
    desc: "Stop anything listening on :8000"
    cmds:
      - lsof -ti:8000 | xargs kill -9 2>/dev/null || echo "backend (:8000) already stopped"
